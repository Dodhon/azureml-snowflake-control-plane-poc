$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: pull_snowflake_snapshots
version: 1
display_name: Pull immutable Snowflake snapshots
type: command
inputs:
  config:
    type: uri_file
  source_batch_id:
    type: string
  source_cutoff:
    type: string
  source_event_id:
    type: string
outputs:
  training_features_snapshot:
    type: uri_folder
  scoring_snapshot:
    type: uri_folder
  actuals_snapshot:
    type: uri_folder
  manifest:
    type: uri_file
code: ../../..
environment: azureml:aml-snowflake-poc-runtime:1
command: >-
  PYTHONPATH=src python -m azureml_snowflake_poc.components.pull
  --config ${{inputs.config}}
  --source-batch-id ${{inputs.source_batch_id}}
  --source-cutoff ${{inputs.source_cutoff}}
  --source-event-id ${{inputs.source_event_id}}
  --training-features-output ${{outputs.training_features_snapshot}}
  --scoring-output ${{outputs.scoring_snapshot}}
  --actuals-output ${{outputs.actuals_snapshot}}
  --manifest-output ${{outputs.manifest}}
