$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: invoke_selected_batch_deployment
version: 1
display_name: Invoke selected batch deployment
type: command
inputs:
  config:
    type: uri_file
  selection:
    type: uri_file
  feature_snapshot:
    type: uri_folder
outputs:
  predictions:
    type: uri_folder
  scoring_result:
    type: uri_file
code: ../../..
environment: azureml:aml-snowflake-poc-runtime:1
command: >-
  PYTHONPATH=src python -m azureml_snowflake_poc.components.invoke_batch
  --config ${{inputs.config}}
  --selection ${{inputs.selection}}
  --features-input ${{inputs.feature_snapshot}}
  --predictions-output ${{outputs.predictions}}
  --result-output ${{outputs.scoring_result}}
