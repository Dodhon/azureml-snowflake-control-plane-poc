$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: prepare_model_monitor_data
version: 1
display_name: Prepare Azure ML monitor datasets
type: command
inputs:
  config:
    type: uri_file
  feature_snapshot:
    type: uri_folder
  training_snapshot:
    type: uri_folder
  actuals_snapshot:
    type: uri_folder
  predictions:
    type: uri_folder
  publish_result:
    type: uri_file
outputs:
  model_inputs:
    type: uri_folder
  model_outputs:
    type: uri_folder
  reference_data:
    type: uri_folder
  ground_truth:
    type: uri_folder
  monitor_manifest:
    type: uri_file
code: ../../..
environment: azureml:aml-snowflake-poc-runtime:1
command: >-
  PYTHONPATH=src python -m azureml_snowflake_poc.components.prepare_monitor_data
  --config ${{inputs.config}}
  --features-input ${{inputs.feature_snapshot}}
  --training-input ${{inputs.training_snapshot}}
  --actuals-input ${{inputs.actuals_snapshot}}
  --predictions-input ${{inputs.predictions}}
  --publish-result ${{inputs.publish_result}}
  --model-inputs-output ${{outputs.model_inputs}}
  --model-outputs-output ${{outputs.model_outputs}}
  --reference-output ${{outputs.reference_data}}
  --ground-truth-output ${{outputs.ground_truth}}
  --manifest-output ${{outputs.monitor_manifest}}
