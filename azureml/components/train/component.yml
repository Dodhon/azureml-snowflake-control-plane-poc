$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: train_exact_quantity_candidate
version: 1
display_name: Train exact-quantity candidate
type: command
inputs:
  config:
    type: uri_file
  training_snapshot:
    type: uri_folder
  data_decision:
    type: uri_file
  source_manifest:
    type: uri_file
outputs:
  candidate_model:
    type: uri_folder
  training_result:
    type: uri_file
code: ../../..
environment: azureml:aml-snowflake-poc-runtime:1
command: >-
  PYTHONPATH=src python -m azureml_snowflake_poc.components.train
  --config ${{inputs.config}}
  --training-input ${{inputs.training_snapshot}}
  --data-decision ${{inputs.data_decision}}
  --source-manifest ${{inputs.source_manifest}}
  --model-output ${{outputs.candidate_model}}
  --result-output ${{outputs.training_result}}
