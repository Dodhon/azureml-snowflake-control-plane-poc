$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: build_feature_and_training_snapshots
version: 1
display_name: Validate and engineer features
type: command
inputs:
  config:
    type: uri_file
  scoring_snapshot:
    type: uri_folder
  training_features_snapshot:
    type: uri_folder
  actuals_snapshot:
    type: uri_folder
outputs:
  feature_snapshot:
    type: uri_folder
  training_snapshot:
    type: uri_folder
  data_decision:
    type: uri_file
code: ../../..
environment: azureml:aml-snowflake-poc-runtime:1
command: >-
  PYTHONPATH=src python -m azureml_snowflake_poc.components.build_features
  --config ${{inputs.config}}
  --scoring-input ${{inputs.scoring_snapshot}}
  --training-features-input ${{inputs.training_features_snapshot}}
  --actuals-input ${{inputs.actuals_snapshot}}
  --features-output ${{outputs.feature_snapshot}}
  --training-output ${{outputs.training_snapshot}}
  --decision-output ${{outputs.data_decision}}
